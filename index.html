<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifTruck | MK's Master Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <section class="p-8 max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold mb-4">Book a LifTruck</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-6 rounded-lg shadow">
            <div>
                <label class="block text-sm font-medium">Select Weight Class</label>
                <select id="weightSelect" class="w-full p-2 border rounded">
                    <option value="small">Small (Bike/Small Car)</option>
                    <option value="medium">Medium (Van/Pickup)</option>
                    <option value="large">Large (Light Truck)</option>
                    <option value="heavy">Heavy (Lorry)</option>
                </select>
            </div>
            <button id="findDriversBtn" class="bg-green-600 text-white p-2 rounded mt-6">Find Available Drivers</button>
        </div>

        <div id="driverResults" class="mt-8 grid gap-4"></div>
    </section>

    <section class="bg-blue-900 text-white p-8 mt-12">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold">Want to drive for MK?</h2>
            <p class="mb-4">Apply today and start earning.</p>
            <form id="driverAppForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" placeholder="Full Name" class="p-2 rounded text-black" required>
                <input type="email" placeholder="Email Address" class="p-2 rounded text-black" required>
                <button type="submit" class="bg-yellow-500 text-blue-900 font-bold p-2 rounded">Apply Now</button>
            </form>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
